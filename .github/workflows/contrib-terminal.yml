name: Generate contribution terminal

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/render_contrib.py"
      - ".github/workflows/contrib-terminal.yml"

permissions:
  contents: write

concurrency:
  group: contrib-terminal
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_LOGIN: ${{ github.repository_owner }}
        run: python3 scripts/render_contrib.py
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status -s assets/) ]]; then
            git add assets/
            git commit -m "chore: refresh contribution terminal"
            git push
          fi
